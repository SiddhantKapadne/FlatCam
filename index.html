<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>FlatCam</title>
  <style>
    :root {
      /* Motion — iOS spring curves */
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-out: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --ease-in-out: cubic-bezier(0.42, 0, 0.58, 1);

      /* Apple HIG — System colors */
      --apple-blue: #007aff;
      --apple-green: #34c759;
      --apple-indigo: #5856d6;
      --apple-orange: #ff9500;
      --apple-pink: #ff2d55;
      --apple-purple: #af52de;
      --apple-red: #ff3b30;
      --apple-teal: #5ac8fa;
      --apple-yellow: #ffcc00;
      --apple-gray: #8e8e93;
      --apple-gray2: #aeaeb2;
      --apple-gray3: #c7c7cc;
      --apple-gray4: #d1d1d6;
      --apple-gray5: #e5e5ea;
      --apple-gray6: #f2f2f7;

      /* Apple HIG — Labels & fills (dark UI on camera) */
      --apple-label: #ffffff;
      --apple-secondary-label: rgba(235, 235, 245, 0.6);
      --apple-tertiary-label: rgba(235, 235, 245, 0.3);
      --apple-quaternary-fill: rgba(116, 116, 128, 0.18);
      --apple-tertiary-fill: rgba(118, 118, 128, 0.24);
      --apple-secondary-fill: rgba(120, 120, 128, 0.36);
      --apple-system-fill: rgba(120, 120, 128, 0.5);
      --apple-grouped-bg: rgba(28, 28, 30, 0.82);
      --apple-separator: rgba(84, 84, 88, 0.65);

      /* Per-control tints (Apple semantic) */
      --upload-icon: var(--apple-blue);
      --upload-fill: rgba(0, 122, 255, 0.22);
      --upload-fill-pressed: rgba(0, 122, 255, 0.38);
      --download-icon: var(--apple-green);
      --download-fill: rgba(52, 199, 89, 0.22);
      --download-fill-pressed: rgba(52, 199, 89, 0.38);
      --capture-fill: var(--apple-yellow);
      --capture-fill-pressed: #e6b800;
      --capture-ring: #ffffff;
      --capture-icon: #1c1c1e;
      --flip-icon: var(--apple-label);
      --flip-fill: var(--apple-secondary-fill);
      --flip-fill-pressed: var(--apple-system-fill);

      --status-bg: var(--apple-grouped-bg);
      --status-text: var(--apple-label);
      --status-success-bg: rgba(52, 199, 89, 0.92);
      --status-error-bg: rgba(255, 59, 48, 0.92);

      --chrome-material: rgba(28, 28, 30, 0.72);
      --shadow-elevated: 0 8px 32px rgba(0, 0, 0, 0.35);
      --focus-ring: 0 0 0 3px rgba(0, 122, 255, 0.55);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #000;
    }

    .view-wrap {
      flex: 1;
      width: 100%;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .view {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    @media (min-width: 640px) {
      html, body, .app, .view-wrap {
        background: #e2e2e5;
      }
      .view {
        width: auto;
        height: 100%;
        max-height: calc(100dvh - 2rem);
        aspect-ratio: 9 / 16;
        max-width: min(420px, 100vw - 2rem);
        border-radius: 20px;
        box-shadow: var(--shadow-elevated);
      }
      :root {
        --chrome-material: rgba(255, 255, 255, 0.82);
        --apple-grouped-bg: rgba(255, 255, 255, 0.92);
        --status-text: #000000;
        --upload-fill: rgba(0, 122, 255, 0.14);
        --upload-fill-pressed: rgba(0, 122, 255, 0.26);
        --download-fill: rgba(52, 199, 89, 0.14);
        --download-fill-pressed: rgba(52, 199, 89, 0.26);
        --flip-fill: rgba(120, 120, 128, 0.16);
        --flip-fill-pressed: rgba(120, 120, 128, 0.28);
        --flip-icon: #3c3c43;
      }
    }

    #out {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    video, #file {
      display: none;
    }

  /* iOS Camera–style control dock */
    .controls {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 12px max(20px, env(safe-area-inset-left)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-right));
      background: linear-gradient(to top, rgba(0, 0, 0, 0.55) 0%, transparent 100%);
      pointer-events: none;
    }

    .controls-left,
    .controls-right {
      display: flex;
      align-items: center;
      pointer-events: auto;
    }

    .controls-left {
      flex-direction: row;
      gap: 12px;
    }

    .controls-right {
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .btn {
      position: relative;
      border: none;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition:
        transform 0.45s var(--ease-spring),
        opacity 0.3s var(--ease-out),
        box-shadow 0.3s var(--ease-out),
        filter 0.2s ease;
      will-change: transform;
    }

    .btn::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      pointer-events: none;
    }

    .btn.is-pressed,
    .btn:active {
      transform: scale(0.88);
      transition-duration: 0.12s;
      transition-timing-function: var(--ease-out);
    }

    .btn:focus-visible {
      outline: none;
      box-shadow: var(--focus-ring);
    }

    .btn svg {
      display: block;
      position: relative;
      z-index: 1;
    }

    .btn-secondary {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.22);
    }

    /* Upload — systemBlue */
    .btn-upload {
      color: var(--upload-icon);
      background: var(--upload-fill);
    }

    .btn-upload:hover {
      background: var(--upload-fill-pressed);
    }

    .btn-upload:active,
    .btn-upload.is-pressed {
      background: var(--upload-fill-pressed);
      color: var(--apple-blue);
    }

    .btn-upload svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.25;
    }

    /* Download — systemGreen */
    .btn-download {
      color: var(--download-icon);
      background: var(--download-fill);
      width: 0;
      min-width: 0;
      height: 44px;
      opacity: 0;
      transform: scale(0.35);
      pointer-events: none;
      overflow: hidden;
      padding: 0;
      box-shadow: none;
    }

    .btn-download::after {
      opacity: 0;
    }

    .btn-download.is-ready {
      width: 44px;
      min-width: 44px;
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      background: var(--download-fill);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.22);
    }

    .btn-download.is-ready:hover {
      background: var(--download-fill-pressed);
    }

    .btn-download.is-ready:active,
    .btn-download.is-ready.is-pressed {
      background: var(--download-fill-pressed);
      color: var(--apple-green);
    }

    .btn-download.is-ready::after {
      opacity: 1;
    }

    .btn-download svg {
      width: 22px;
      height: 22px;
      stroke-width: 2.25;
    }

    /* Flip — secondary fill */
    .btn-flip {
      display: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: var(--flip-icon);
      background: var(--flip-fill);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.18);
    }

    .btn-flip:hover {
      background: var(--flip-fill-pressed);
    }

    .btn-flip:active,
    .btn-flip.is-pressed {
      background: var(--flip-fill-pressed);
      color: var(--apple-gray5);
    }

    .btn-flip svg {
      width: 20px;
      height: 20px;
      stroke-width: 2.25;
    }

    /* Capture — systemYellow + white ring (Camera app) */
    .btn-capture {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: var(--capture-fill);
      color: var(--capture-icon);
      box-shadow:
        0 0 0 4px var(--capture-ring),
        0 4px 20px rgba(0, 0, 0, 0.35);
    }

    .btn-capture:hover {
      background: #ffe033;
    }

    .btn-capture:active,
    .btn-capture.is-pressed {
      background: var(--capture-fill-pressed);
      box-shadow:
        0 0 0 4px var(--capture-ring),
        0 2px 12px rgba(0, 0, 0, 0.4);
    }

    .btn-capture::after {
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.1);
    }

    .btn-capture svg {
      width: 30px;
      height: 30px;
    }

    @media (max-width: 639px) {
      .controls-right .btn-flip {
        display: inline-flex;
      }
    }

    @media (min-width: 640px) {
      .controls {
        padding-bottom: max(16px, env(safe-area-inset-bottom));
      }
      .controls-right {
        flex-direction: row;
        gap: 16px;
      }
      .controls-right .btn-flip {
        display: none;
      }
    }

    .status {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) translateY(-8px);
      z-index: 12;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      line-height: 1.3;
      color: var(--status-text);
      text-align: center;
      max-width: min(90%, 320px);
      padding: 8px 14px;
      border-radius: 14px;
      background: var(--status-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      pointer-events: none;
      opacity: 0;
      transition:
        opacity 0.35s var(--ease-out),
        transform 0.45s var(--ease-spring),
        background-color 0.25s var(--ease-out);
    }

    .status.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .status.ok {
      background: var(--status-success-bg);
      color: #ffffff;
    }

    .status.err {
      background: var(--status-error-bg);
      color: #ffffff;
    }

    @media (prefers-reduced-motion: reduce) {
      .btn,
      .status,
      .btn-download {
        transition: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="view-wrap">
      <div class="view" id="view">
        <canvas id="out"></canvas>
        <p class="status" id="status" role="status" aria-live="polite"></p>
        <nav class="controls" aria-label="Camera controls">
          <div class="controls-left">
            <label class="btn btn-secondary btn-upload" for="file" aria-label="Upload">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 14V4"/>
                <path d="M8 8l4-4 4 4"/>
                <path d="M5 20h14"/>
              </svg>
            </label>
            <button type="button" class="btn btn-secondary btn-download" id="downloadBtn" aria-label="Download" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 10v10"/>
                <path d="M8 16l4 4 4-4"/>
                <path d="M5 4h14"/>
              </svg>
            </button>
          </div>
          <input type="file" id="file" accept="image/*" />
          <div class="controls-right">
            <button type="button" class="btn btn-flip" id="flipBtn" aria-label="Flip camera">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 7h13a4 4 0 0 1 0 8H7"/>
                <path d="M7 11L3 7l4-4"/>
                <path d="M21 17H8a4 4 0 0 1 0-8h9"/>
                <path d="M17 13l4 4-4 4"/>
              </svg>
            </button>
            <button type="button" class="btn btn-capture" id="cameraBtn" aria-label="Capture">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M9 7h1.5l1-1.5h3L15.5 7H17a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2zm3 10.5a4.5 4.5 0 1 0 0-9 4.5 4.5 0 0 0 0 9z"/>
              </svg>
            </button>
          </div>
        </nav>
      </div>
    </div>
    <video id="cam" autoplay playsinline muted webkit-playsinline></video>
  </div>
  <script src="app.js"></script>
</body>
</html>
